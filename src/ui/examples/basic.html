<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth UI Components - Basic Example</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    #app {
      width: 100%;
      max-width: 500px;
    }
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .tab {
      flex: 1;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .tab:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    .tab.active {
      background: white;
      color: #667eea;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="tabs">
      <button class="tab active" data-tab="login">Login Form</button>
      <button class="tab" data-tab="mfa">MFA Input</button>
      <button class="tab" data-tab="session">Session Status</button>
    </div>
    <div id="auth-container"></div>
  </div>

  <script type="module">
    // This example demonstrates the UI components
    // In production, import from: import { LoginForm, MfaInput, SessionStatus } from '@aledan/tester'

    // Mock implementations for demonstration
    class LoginForm {
      constructor(container, props) {
        this.container = container
        this.props = props
        this.render()
      }

      render() {
        const theme = this.props.theme || {}
        this.container.innerHTML = `
          <div style="background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <h2 style="margin: 0 0 1.5rem; font-size: 1.5rem;">Sign In</h2>
            <form id="login-form">
              <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Username or Email</label>
                <input type="text" id="username" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
              </div>
              <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">Password</label>
                <input type="password" id="password" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem;">
              </div>
              <button type="submit" style="width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: 500; cursor: pointer;">
                Sign In
              </button>
            </form>
          </div>
        `

        const form = this.container.querySelector('#login-form')
        form.addEventListener('submit', async (e) => {
          e.preventDefault()
          const username = this.container.querySelector('#username').value
          const password = this.container.querySelector('#password').value
          await this.props.onSubmit({ username, password })
        })
      }

      destroy() {
        this.container.innerHTML = ''
      }
    }

    class MfaInput {
      constructor(container, props) {
        this.container = container
        this.props = props
        this.render()
      }

      render() {
        this.container.innerHTML = `
          <div style="background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <h2 style="margin: 0 0 0.5rem; font-size: 1.5rem;">Two-Factor Authentication</h2>
            <p style="margin: 0 0 1.5rem; color: #666; font-size: 0.875rem;">
              Enter the 6-digit code from your authenticator app
            </p>
            <div style="display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem;">
              ${Array.from({ length: 6 }, (_, i) => `
                <input
                  type="text"
                  maxlength="1"
                  class="mfa-digit"
                  data-index="${i}"
                  style="width: 3rem; height: 3.5rem; text-align: center; font-size: 1.5rem; border: 2px solid #ddd; border-radius: 4px;"
                >
              `).join('')}
            </div>
            <button id="verify-btn" style="width: 100%; padding: 0.75rem; background: #667eea; color: white; border: none; border-radius: 4px; font-size: 1rem; font-weight: 500; cursor: pointer;">
              Verify Code
            </button>
          </div>
        `

        const inputs = this.container.querySelectorAll('.mfa-digit')
        inputs.forEach((input, i) => {
          input.addEventListener('input', (e) => {
            if (e.target.value && i < inputs.length - 1) {
              inputs[i + 1].focus()
            }
          })
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !e.target.value && i > 0) {
              inputs[i - 1].focus()
            }
          })
        })

        const verifyBtn = this.container.querySelector('#verify-btn')
        verifyBtn.addEventListener('click', async () => {
          const code = Array.from(inputs).map(i => i.value).join('')
          if (code.length === 6) {
            await this.props.onComplete(code)
          }
        })
      }

      destroy() {
        this.container.innerHTML = ''
      }
    }

    class SessionStatus {
      constructor(container, props) {
        this.container = container
        this.props = props
        this.render()
      }

      render() {
        this.container.innerHTML = `
          <div style="background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <div style="display: flex; align-items: center; justify-content: space-between;">
              <div style="display: flex; align-items: center; gap: 0.75rem;">
                <div style="width: 40px; height: 40px; background: #667eea; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600;">
                  ${this.props.username?.substring(0, 2).toUpperCase() || 'U'}
                </div>
                <div>
                  <div style="font-weight: 500;">${this.props.username || 'User'}</div>
                  <div style="font-size: 0.75rem; color: #666;">
                    <span style="display: inline-block; width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-right: 0.5rem;"></span>
                    Active
                  </div>
                </div>
              </div>
              <button id="logout-btn" style="padding: 0.5rem 1rem; border: 1px solid #ddd; background: transparent; border-radius: 4px; font-weight: 500; cursor: pointer;">
                Sign Out
              </button>
            </div>
          </div>
        `

        const logoutBtn = this.container.querySelector('#logout-btn')
        logoutBtn.addEventListener('click', async () => {
          if (this.props.onLogout) {
            await this.props.onLogout()
          }
        })
      }

      destroy() {
        this.container.innerHTML = ''
      }
    }

    // Demo app
    const container = document.getElementById('auth-container')
    let currentComponent = null

    function showLogin() {
      if (currentComponent) currentComponent.destroy()
      currentComponent = new LoginForm(container, {
        onSubmit: async (credentials) => {
          console.log('Login submitted:', credentials)
          alert(`Login submitted: ${credentials.username}`)
          return { success: true }
        }
      })
    }

    function showMfa() {
      if (currentComponent) currentComponent.destroy()
      currentComponent = new MfaInput(container, {
        onComplete: async (code) => {
          console.log('MFA code:', code)
          alert(`MFA code submitted: ${code}`)
          return { success: true }
        }
      })
    }

    function showSession() {
      if (currentComponent) currentComponent.destroy()
      currentComponent = new SessionStatus(container, {
        isAuthenticated: true,
        username: 'John Doe',
        onLogout: async () => {
          console.log('Logout clicked')
          alert('Logout clicked')
        }
      })
    }

    // Tab switching
    const tabs = document.querySelectorAll('.tab')
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'))
        tab.classList.add('active')

        const tabName = tab.dataset.tab
        if (tabName === 'login') showLogin()
        else if (tabName === 'mfa') showMfa()
        else if (tabName === 'session') showSession()
      })
    })

    // Start with login form
    showLogin()
  </script>
</body>
</html>
